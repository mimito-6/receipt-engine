<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>receipt-engine 試玩場</title>
<style>
  :root {
    --bg: #f4f4f7;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #d6336c;
    --accent-soft: #ffe3ef;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    line-height: 1.55;
    padding: env(safe-area-inset-top) 0 0;
  }
  header {
    padding: 18px 16px 10px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 14px 40px;
    display: grid;
    gap: 14px;
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .label { font-size: 12px; color: var(--muted); width: 100%; margin-bottom: 2px; }
  button {
    font: inherit;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { border-color: var(--accent); }
  button.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  select, button.ghost { border-radius: 10px; }
  textarea {
    width: 100%;
    min-height: 220px;
    font-family: ui-monospace, 'SFMono-Regular', Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    resize: vertical;
    background: #fbfbfd;
    color: var(--ink);
  }
  .preview {
    display: flex;
    justify-content: center;
    background: repeating-conic-gradient(#eee 0% 25%, #f7f7f9 0% 50%) 50% / 18px 18px;
    border-radius: 12px;
    padding: 14px;
    overflow: auto;
  }
  .preview svg {
    width: 100%;
    max-width: 420px;
    height: auto;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,.12));
    border-radius: 10px;
  }
  .error {
    color: #b42318;
    background: #fee4e2;
    border: 1px solid #fda29b;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    white-space: pre-wrap;
    display: none;
  }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .actions button { flex: 1 1 auto; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 6px 16px 24px; }
  footer code { background: #ececed; padding: 1px 5px; border-radius: 4px; }
  @media (min-width: 760px) {
    .wrap { grid-template-columns: 1fr 1fr; align-items: start; }
    header, .controls, footer { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<header>
  <h1>🧾 receipt-engine 試玩場</h1>
  <p>改一改右邊的資料,左邊的收據即時變。整個過程都在你的瀏覽器裡跑——手機也行。</p>
</header>

<div class="wrap">
  <div class="panel controls">
    <div class="row">
      <span class="label">挑一個樣式</span>
      <button data-theme="minimal" class="theme">簡約</button>
      <button data-theme="cute" class="theme active">可愛</button>
      <button data-theme="thermal" class="theme">收據機風</button>
    </div>
    <div class="row" style="margin-top:10px">
      <span class="label">載入範例</span>
      <select id="example">
        <option value="cute">同人攤位</option>
        <option value="coffee">咖啡店</option>
        <option value="market">手作市集</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <div class="label">預覽</div>
    <div class="error" id="error"></div>
    <div class="preview" id="preview"></div>
    <div class="actions" style="margin-top:12px">
      <button class="ghost" id="dl-svg">下載圖片 (SVG)</button>
      <button class="ghost" id="dl-html">下載網頁 (HTML)</button>
    </div>
  </div>

  <div class="panel">
    <div class="label">收據資料(可直接編輯)</div>
    <textarea id="json" spellcheck="false"></textarea>
  </div>
</div>

<footer>
  純前端 · 不上傳任何資料 · 由 <code>@receipt-engine/render-svg</code> 在瀏覽器內渲染
</footer>

<script src="./receipt-engine.global.js"></script>
<script>
(function () {
  const examples = {
    coffee: {
      schemaVersion: "0.1",
      currency: "USD",
      merchant: { name: "Corner Coffee", subtitle: "Daily roast & fresh bakes", icon: "☕" },
      transaction: { receiptNo: "0042", issuedAt: "2026-06-01T08:15:00-07:00", cashier: "Sam" },
      items: [
        { name: "Flat White", quantity: 1, unitPrice: 4.5 },
        { name: "Butter Croissant", quantity: 2, unitPrice: 3.25 }
      ],
      payments: [{ method: "Cash", amount: 15 }],
      qr: { value: "https://corner.coffee/r/0042", label: "View online" },
      message: { title: "Thank you!", body: "Have a lovely day.", footer: "See you tomorrow" }
    },
    cute: {
      schemaVersion: "0.1",
      locale: "zh-TW",
      currency: "TWD",
      merchant: { name: "Mimito Booth", subtitle: "手作 × 插畫 × 小誌", icon: "🎀" },
      event: { name: "Artist Alley", boothNumber: "A12", location: "Taipei", date: "2026-06-01" },
      transaction: { receiptNo: "AA-A12-018", issuedAt: "2026-06-01T14:30:00+08:00", cashier: "Mimi" },
      items: [
        { name: "Sticker Set", variant: "Pastel", quantity: 2, unitPrice: 120, tags: ["新刊"] },
        { name: "Mini Zine", variant: "32p / A6", quantity: 1, unitPrice: 180, tags: ["新刊", "特典"], note: "含限定書籤" },
        { name: "Acrylic Charm", variant: "Cat", quantity: 1, unitPrice: 250 }
      ],
      discounts: [{ label: "套組優惠 Set deal", amount: 50 }],
      payments: [{ method: "Cash", amount: 700 }],
      qr: { value: "https://instagram.com/mimito.art", label: "追蹤我們", caption: "新作 & 下次擺攤資訊" },
      message: { title: "Thank you! ♡", body: "感謝支持我們的攤位,希望你喜歡這次的作品。", footer: "See you next event!" }
    },
    market: {
      schemaVersion: "0.1",
      locale: "zh-TW",
      currency: "TWD",
      merchant: { name: "微光手作 Glow", subtitle: "蠟燭・乾燥花・香氛", icon: "🕯️" },
      event: { name: "週末手作市集", boothName: "Row B · Stall 7", location: "華山 1914", date: "2026-06-01" },
      transaction: { receiptNo: "MKT-20260601-031", issuedAt: "2026-06-01T16:05:00+08:00", cashier: "阿光" },
      items: [
        { name: "大豆蠟燭 Soy Candle", variant: "海鹽鼠尾草", quantity: 1, unitPrice: 480 },
        { name: "乾燥花束 Dried Bouquet", quantity: 1, unitPrice: 360 },
        { name: "香氛蠟磚 Wax Tablet", quantity: 3, unitPrice: 150 }
      ],
      discounts: [{ label: "市集首日優惠", amount: 129 }],
      payments: [{ method: "Cash", amount: 1500 }],
      qr: { value: "https://glow.example/feedback", label: "填回饋拿小禮" },
      message: { body: "手工製作,每件都獨一無二。", footer: "下次市集見 ☀" }
    }
  };

  const $ = (id) => document.getElementById(id);
  const preview = $("preview");
  const errorBox = $("error");
  const json = $("json");
  let theme = "cute";

  function currentReceipt() {
    return JSON.parse(json.value);
  }

  function render() {
    let data;
    try {
      data = currentReceipt();
    } catch (e) {
      return showError("JSON 格式有誤:\n" + e.message);
    }
    const check = ReceiptEngine.safeValidateReceipt(data);
    if (!check.success) {
      return showError("收據資料不符合規格:\n\n" + check.error.format());
    }
    try {
      preview.innerHTML = ReceiptEngine.renderReceiptToSvg(check.data, { theme: theme });
      errorBox.style.display = "none";
    } catch (e) {
      showError(e.message);
    }
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  function download(filename, text, type) {
    const blob = new Blob([text], { type: type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadExample(key) {
    json.value = JSON.stringify(examples[key], null, 2);
    render();
  }

  document.querySelectorAll(".theme").forEach((btn) => {
    btn.addEventListener("click", () => {
      theme = btn.dataset.theme;
      document.querySelectorAll(".theme").forEach((b) => b.classList.toggle("active", b === btn));
      render();
    });
  });
  $("example").addEventListener("change", (e) => loadExample(e.target.value));

  let timer;
  json.addEventListener("input", () => {
    clearTimeout(timer);
    timer = setTimeout(render, 250);
  });

  $("dl-svg").addEventListener("click", () => {
    try {
      const svg = ReceiptEngine.renderReceiptToSvg(currentReceipt(), { theme: theme, includeXmlDeclaration: true });
      download("receipt.svg", svg, "image/svg+xml");
    } catch (e) { showError(e.message); }
  });
  $("dl-html").addEventListener("click", () => {
    try {
      const html = ReceiptEngine.renderReceiptToHtml(currentReceipt(), { theme: theme });
      download("receipt.html", html, "text/html");
    } catch (e) { showError(e.message); }
  });

  loadExample("cute");
})();
</script>
</body>
</html>
