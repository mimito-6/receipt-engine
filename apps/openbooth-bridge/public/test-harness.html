<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OB.receipt bridge — test harness</title>
<style>body{font-family:system-ui,sans-serif;padding:24px;max-width:560px;margin:0 auto}button{font:inherit;padding:10px 16px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer;margin:4px}</style>
</head>
<body>
<h1>OpenBooth ⇄ receipt-engine 橋接測試</h1>
<p>模擬 OpenBooth 結帳完成,觸發 <code>OB.receipt.handle(savedTx)</code>。</p>
<button id="go">模擬結帳(現金)</button>
<button id="settings">收據設定</button>

<!-- 1) the bridge (sets window.ReceiptBridge) -->
<script src="./openbooth-receipt-bridge.global.js"></script>
<!-- 2) a fake OpenBooth OB.store + a committed transaction -->
<script>
  window.OB = window.OB || {}
  window.OB.store = {
    get: function () {
      return {
        settings: { shopName: '微光手作 Glow', currencyCode: 'TWD', currencySymbol: 'NT$', locale: 'zh-TW' },
        events: [{ id: 'e1', name: '週末手作市集', boothName: 'Row B · Stall 7', location: '華山 1914', date: '2026-06-01' }],
      }
    },
    currentEvent: function () {
      return { id: 'e1', name: '週末手作市集', boothName: 'Row B · Stall 7', location: '華山 1914', date: '2026-06-01' }
    },
  }
  window.SAMPLE_TX = {
    id: 'MKT-20260601-031',
    time: Date.parse('2026-06-01T16:05:00+08:00'),
    eventId: 'e1',
    voided: false,
    lines: [
      { kind: 'product', refId: 'p1', name: '大豆蠟燭 Soy Candle', unitPrice: 480, basePrice: 480, qty: 1, lineTotal: 480, isTokuten: false },
      { kind: 'product', refId: 'p2', name: '香氛蠟磚 Wax Tablet', unitPrice: 150, basePrice: 150, qty: 3, lineTotal: 400, isTokuten: false },
      { kind: 'product', refId: 'p3', name: '感謝小卡', unitPrice: 0, basePrice: 0, qty: 1, lineTotal: 0, isTokuten: true },
    ],
    subtotal: 880,
    discount: 80,
    bundleSaved: 50,
    grandTotal: 800,
    paymentMethodName: '現金 Cash',
    paymentType: 'cash',
    cashReceived: 1000,
    changeGiven: 200,
    giftNote: '滿額禮:貼紙一張 ♡',
  }
</script>
<!-- 3) the glue (defines OB.receipt) -->
<script src="./openbooth-receipt.js"></script>
<script>
  document.getElementById('go').onclick = function () { OB.receipt.handle(window.SAMPLE_TX) }
  document.getElementById('settings').onclick = function () { OB.receipt.openSettings() }
</script>
</body>
</html>
